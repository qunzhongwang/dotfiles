# =============================================================================
# tmux configuration — TPM managed, OSC 52 copy-paste for headless servers
# =============================================================================

# --- Prefix -------------------------------------------------------------------
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# --- General ------------------------------------------------------------------
set -g default-shell /usr/bin/zsh
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Pane splitting -----------------------------------------------------------
bind-key | split-window -h
bind-key - split-window -v

# --- Vi mode + copy -----------------------------------------------------------
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection

# --- Status bar ---------------------------------------------------------------
set -g status-bg black
set -g status-fg white
set -g status-left '#[fg=green]#H #[fg=yellow]#(date "+%Y-%m-%d %H:%M")'
set -g status-justify centre
set -g status-right '#[fg=cyan]#(nvidia-smi --query-gpu=utilization.gpu,memory.used --format=csv,noheader,nounits 2>/dev/null | awk -F, '\''{gpu_sum+=$1; if($2>mem_max) mem_max=$2; gpu_count++} END {if(gpu_count>0) print "GPU Avg:" gpu_sum/gpu_count "%% Mem Max:" mem_max "MB"; else print "No GPU"}'\'')'

# --- TPM Plugins --------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# tmux-yank: use OSC 52 for clipboard (works over SSH, no xclip needed)
set -g @yank_with_mouse on
set -g @yank_action 'copy-pipe'

# tmux-resurrect: save/restore sessions
set -g @resurrect-capture-pane-contents 'on'

# --- Initialize TPM (must be last line) ---------------------------------------
run '~/.tmux/plugins/tpm/tpm'
